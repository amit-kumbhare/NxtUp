
{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NxtUp - For CP</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'sheet/layout.css' %}">

{% block extra_css %}{% endblock %}
</head>
<body>

<div class="tooltip" id="tooltip"></div>

<!-- NAV -->
<nav>
  <div class="nav-left">
    <a href="{% url 'profile' %}" class="nav-logo">NxtUp</a>
    <a href="{% url 'blind_order' %}" class="nav-link">Blind Order</a>
    <a href="{% url 'topic_wise' %}" class="nav-link">Topic Wise</a>
    <a href="{% url 'recommendations' %}" class="nav-link">Recommendations</a>
    <a href="{% url 'notes' %}"     class="nav-link">Notes</a>
  </div>
  <div class="nav-right">
    
          <!-- LeetCode Button -->
      <a href="https://leetcode.com" target="_blank" class="profile-nav-btn">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M13.483 0a1.374 1.374 0 0 0-.961.411L7.116 5.826a1.373 1.373 0 0 0-.41 1.015v4.322L2.3 13.52a2.747 2.747 0 0 0 0 3.884l3.19 3.19a2.744 2.744 0 0 0 3.881 0l6.398-6.397a1.382 1.382 0 0 0 .411-1.015V4.607L20.584 1a1.374 1.374 0 0 0-1.423-.374l-5.678 1.374zM10.5 8.5h3v3h-3v-3zm0 5h3v3h-3v-3z"/>
        </svg>
        LeetCode
      </a>

      <!-- GitHub Button -->
      <a href="https://github.com" target="_blank" class="profile-nav-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
        </svg>
        GitHub
      </a>
      <a href="https://codeforces.com" target="_blank" class="profile-nav-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
        </svg>
        CodeForces
      </a>
      <button class="theme-btn" id="themeBtn" title="Toggle theme">☀</button>
    <a href="{% url 'profile' %}" class="profile-nav-btn">
      <div class="pfp" style="width:24px;height:24px;font-size:11px;border-radius:6px;background:linear-gradient(135deg,#e8531e,#f0a020)">A</div>
      Profile
    </a>
  </div>
</nav>


{% block body %}
{% endblock %}

{% block extra_js %}{% endblock %}

</body>
</html>
