<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
 
    <div class="container bg-white p-4 rounded shadow-sm" style="max-width: 600px;">
        <h2 class="mb-4">Control Panel</h2>
 
        <div class="mb-4">
            <label for="user_handle" class="form-label fw-bold">User Handle</label>
            <input type="text" name="handle" id="user_handle" class="form-control" placeholder="@username">
        </div>
 
        <h5 class="mb-3 text-muted">Backend Functions</h5>
        <div class="d-flex flex-wrap gap-2">
            <button type="button" class="btn btn-primary">Primary</button>
            <button type="button" class="btn btn-secondary">Secondary</button>
            <button type="button" class="btn btn-success">Success</button>
            <button type="button" class="btn btn-danger">Danger</button>
            <button type="button" class="btn btn-warning">Warning</button>
            <button type="button" class="btn btn-info">Info</button>
            <button type="button" class="btn btn-light border">Light</button>
            <button type="button" class="btn btn-dark">Dark</button>
            <button type="button" class="btn btn-link">Link</button>
        </div>

        <h5 class="mb-3 text-muted">API CALLS</h5>
        <div class="d-flex flex-wrap gap-2">
            <button type="submit" onclick="window.location.href='all_submissions';" class="btn btn-primary">All Submissions</button>
            <button type="button" onclick="window.location.href='recent_submissions';" class="btn btn-warning">Recent Submissions</button>
        </div>
    </div>
 
</body>
</html>
